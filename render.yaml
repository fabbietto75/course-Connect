# Blueprint Render: forza Python 3.11 (necessario per psycopg2-binary).
# Dopo il push: Dashboard → Blueprint → collega questo repo, oppure copia envVars nel servizio esistente.
services:
  - type: web
    name: courseconnect
    runtime: python
    buildCommand: pip install -r courseconnect-main/requirements.txt
    # Opzioni anti-riavvio: worker unico/threaded, timeout alto, recycle graduale dei worker.
    startCommand: gunicorn --chdir courseconnect-main --bind 0.0.0.0:$PORT --workers 1 --worker-class gthread --threads 2 --keep-alive 30 --timeout 300 --graceful-timeout 60 --max-requests 1000 --max-requests-jitter 100 --worker-tmp-dir /dev/shm app:app
    healthCheckPath: /api/health
    disk:
      name: uploads
      mountPath: /opt/render/project/src/courseconnect-main/static/uploads
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/courseconnect-main/static/uploads
      - key: BACKUP_VIDEOS_IN_DB
        value: "true"
      - key: UPLOAD_BACKUP_MAX_MB
        value: "120"
